---
- name: "Get authenticated with j_security_check & XSRF token"
  hosts: local
  gather_facts: False


  tasks:
    - name: "Task 1: Post authentication request to SD-WAN Manager"
      ansible.builtin.uri:
        url: "{{ vmanage_base_url }}/j_security_check"
        method: POST
        body_format: form-urlencoded
        body:
          j_username: "{{ vmanage_username }}"
          j_password: "{{ vmanage_password }}"
        validate_certs: False
      register: returned_token

    - name: "Task 2: Store j_security_check token cookie"
      set_fact: 
        session_cookie: "{{ returned_token.set_cookie }}"
    
    - name: "Task 3: Retrieve XSRF token"
      ansible.builtin.uri:
        url: "{{ vmanage_base_url }}/dataservice/client/token"
        method: GET
        validate_certs: False
        headers:
          Cookie: "{{ session_cookie}}"
        return_content: True
      register: xsrf_token_result
    
    - name: "Task 4: Print XSRF token cookie"
      debug:
        msg: "{{ xsrf_token_result.content }}"

    - name: "Task 5: Store XSRF token cookie"
      set_fact:
        xsrf_token: "{{ xsrf_token_result.content }}"

